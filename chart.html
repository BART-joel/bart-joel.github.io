<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D3 Animated Bar Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0d1b2a;
      --slate: #1b2d42;
      --gold:  #c9a84c;
      --gold-lt: #e8c97a;
      --smoke: #f4f4f0;
      --white: #ffffff;
      --muted: #6b7280;
      --border: #e0ddd6;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--smoke);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    .chart-wrapper {
      background: var(--white);
      border: 1px solid var(--border);
      border-top: 4px solid var(--navy);
      padding: 40px 40px 32px;
      width: 100%;
      max-width: 820px;
      box-shadow: 0 4px 24px rgba(13,27,42,.08);
    }

    .chart-header {
      margin-bottom: 8px;
    }

    .chart-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--navy);
    }

    .chart-header p {
      font-size: .9rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .dataset-label {
      display: inline-block;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,168,76,.12);
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 20px;
      transition: opacity .3s;
    }

    #chart svg {
      display: block;
      width: 100%;
      overflow: visible;
    }

    .bar {
      fill: var(--navy);
      transition: fill .2s;
      cursor: default;
    }

    .bar:hover { fill: var(--gold); }

    .x-axis text, .y-axis text {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 12px;
      fill: var(--muted);
    }

    .x-axis line, .x-axis path,
    .y-axis line, .y-axis path {
      stroke: var(--border);
    }

    .y-grid line {
      stroke: var(--border);
      stroke-dasharray: 3 3;
    }

    .y-grid path { stroke: none; }

    .value-label {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: var(--navy);
      text-anchor: middle;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn {
      font-family: 'Source Sans 3', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 9px 20px;
      border: 2px solid var(--navy);
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s, transform .1s;
    }

    .btn:hover {
      background: var(--navy);
      color: var(--white);
    }

    .btn.active {
      background: var(--navy);
      color: var(--gold-lt);
      border-color: var(--navy);
    }

    .btn:active { transform: scale(.97); }

    .btn-shuffle {
      border-color: var(--gold);
      color: var(--gold);
      margin-left: auto;
    }

    .btn-shuffle:hover {
      background: var(--gold);
      color: var(--white);
      border-color: var(--gold);
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: var(--navy);
      color: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      font-size: .82rem;
      padding: 7px 13px;
      border-left: 3px solid var(--gold);
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
      z-index: 999;
      white-space: nowrap;
    }

    .source-note {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 14px;
      text-align: right;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="chart-wrapper">
  <div class="chart-header">
    <h2>Animated D3 Bar Chart</h2>
    <p>Click a dataset button to transition the data — hover bars for values.</p>
  </div>

  <div class="dataset-label" id="ds-label">Dataset: Monthly Revenue</div>

  <div id="chart"></div>

  <p class="source-note">* Dummy data for demonstration purposes</p>

  <div class="btn-row">
    <button class="btn active" data-set="0" onclick="switchDataset(0, this)">Monthly Revenue</button>
    <button class="btn" data-set="1" onclick="switchDataset(1, this)">Units Sold</button>
    <button class="btn" data-set="2" onclick="switchDataset(2, this)">Customer Satisfaction</button>
    <button class="btn btn-shuffle" onclick="shuffleCurrent()">↺ Shuffle</button>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  // ── DATA ──────────────────────────────────────────────
  const datasets = [
    {
      label: "Monthly Revenue",
      unit: "$",
      suffix: "K",
      color: "#0d1b2a",
      data: [
        { category: "Jan", value: 42 },
        { category: "Feb", value: 58 },
        { category: "Mar", value: 51 },
        { category: "Apr", value: 67 },
        { category: "May", value: 74 },
        { category: "Jun", value: 89 },
        { category: "Jul", value: 95 },
        { category: "Aug", value: 83 },
        { category: "Sep", value: 78 },
        { category: "Oct", value: 91 },
        { category: "Nov", value: 104 },
        { category: "Dec", value: 118 },
      ]
    },
    {
      label: "Units Sold",
      unit: "",
      suffix: "",
      color: "#1b2d42",
      data: [
        { category: "Jan", value: 320 },
        { category: "Feb", value: 415 },
        { category: "Mar", value: 390 },
        { category: "Apr", value: 480 },
        { category: "May", value: 510 },
        { category: "Jun", value: 620 },
        { category: "Jul", value: 700 },
        { category: "Aug", value: 665 },
        { category: "Sep", value: 590 },
        { category: "Oct", value: 640 },
        { category: "Nov", value: 750 },
        { category: "Dec", value: 830 },
      ]
    },
    {
      label: "Customer Satisfaction",
      unit: "",
      suffix: "%",
      color: "#0d1b2a",
      data: [
        { category: "Jan", value: 72 },
        { category: "Feb", value: 75 },
        { category: "Mar", value: 70 },
        { category: "Apr", value: 78 },
        { category: "May", value: 82 },
        { category: "Jun", value: 85 },
        { category: "Jul", value: 88 },
        { category: "Aug", value: 84 },
        { category: "Sep", value: 80 },
        { category: "Oct", value: 86 },
        { category: "Nov", value: 91 },
        { category: "Dec", value: 94 },
      ]
    }
  ];

  // ── DIMENSIONS ────────────────────────────────────────
  const margin = { top: 30, right: 20, bottom: 40, left: 52 };
  const totalW  = 740;
  const totalH  = 340;
  const W = totalW - margin.left - margin.right;
  const H = totalH - margin.top  - margin.bottom;

  // ── SVG SETUP ─────────────────────────────────────────
  const svg = d3.select("#chart")
    .append("svg")
    .attr("viewBox", `0 0 ${totalW} ${totalH}`)
    .attr("preserveAspectRatio", "xMidYMid meet");

  const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

  // Scales
  const xScale = d3.scaleBand().range([0, W]).padding(0.28);
  const yScale = d3.scaleLinear().range([H, 0]);

  // Axes groups
  const xAxisG = g.append("g").attr("class", "x-axis").attr("transform", `translate(0,${H})`);
  const yAxisG = g.append("g").attr("class", "y-axis");
  const yGridG = g.append("g").attr("class", "y-grid");

  // Bars group (behind labels)
  const barsG   = g.append("g").attr("class", "bars");
  const labelsG = g.append("g").attr("class", "labels");

  // Tooltip
  const tooltip = document.getElementById("tooltip");

  // ── DRAW / UPDATE ─────────────────────────────────────
  let currentSet = 0;

  function draw(ds, animate = true) {
    const data = ds.data;
    const dur  = animate ? 600 : 0;
    const ease = d3.easeCubicInOut;

    xScale.domain(data.map(d => d.category));
    yScale.domain([0, d3.max(data, d => d.value) * 1.12]).nice();

    // X Axis
    xAxisG.transition().duration(dur).ease(ease)
      .call(d3.axisBottom(xScale).tickSize(0).tickPadding(10));

    // Y Axis
    yAxisG.transition().duration(dur).ease(ease)
      .call(
        d3.axisLeft(yScale)
          .ticks(5)
          .tickSize(0)
          .tickPadding(10)
          .tickFormat(d => ds.unit + d + ds.suffix)
      );

    // Y Grid
    yGridG.transition().duration(dur).ease(ease)
      .call(
        d3.axisLeft(yScale)
          .ticks(5)
          .tickSize(-W)
          .tickFormat("")
      );

    // ── BARS (key by category) ──
    const bars = barsG.selectAll(".bar")
      .data(data, d => d.category);

    // EXIT
    bars.exit()
      .transition().duration(dur / 2).ease(ease)
      .attr("y", H).attr("height", 0).attr("opacity", 0)
      .remove();

    // ENTER
    const barsEnter = bars.enter()
      .append("rect")
      .attr("class", "bar")
      .attr("x", d => xScale(d.category))
      .attr("width", xScale.bandwidth())
      .attr("y", H)
      .attr("height", 0)
      .attr("opacity", 0)
      .on("mousemove", (event, d) => {
        tooltip.style.opacity = "1";
        tooltip.style.left = (event.clientX + 14) + "px";
        tooltip.style.top  = (event.clientY - 32) + "px";
        tooltip.textContent = `${d.category}: ${ds.unit}${d.value.toLocaleString()}${ds.suffix}`;
      })
      .on("mouseleave", () => { tooltip.style.opacity = "0"; });

    // UPDATE + ENTER
    barsEnter.merge(bars)
      .transition().duration(dur).ease(ease)
      .delay((_, i) => i * 35)
      .attr("x", d => xScale(d.category))
      .attr("width", xScale.bandwidth())
      .attr("y", d => yScale(d.value))
      .attr("height", d => H - yScale(d.value))
      .attr("opacity", 1)
      .attr("fill", ds.color);

    // ── VALUE LABELS ──
    const labels = labelsG.selectAll(".value-label")
      .data(data, d => d.category);

    labels.exit()
      .transition().duration(dur / 2)
      .attr("opacity", 0).remove();

    const labelsEnter = labels.enter()
      .append("text")
      .attr("class", "value-label")
      .attr("x", d => xScale(d.category) + xScale.bandwidth() / 2)
      .attr("y", H)
      .attr("opacity", 0);

    labelsEnter.merge(labels)
      .transition().duration(dur).ease(ease)
      .delay((_, i) => i * 35 + 100)
      .attr("x", d => xScale(d.category) + xScale.bandwidth() / 2)
      .attr("y", d => yScale(d.value) - 7)
      .attr("opacity", 1)
      .text(d => ds.unit + d.value + ds.suffix);
  }

  // ── SWITCH DATASET ────────────────────────────────────
  function switchDataset(idx, btn) {
    currentSet = idx;
    document.querySelectorAll(".btn[data-set]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("ds-label").textContent = "Dataset: " + datasets[idx].label;
    draw(datasets[idx]);
  }

  // ── SHUFFLE ───────────────────────────────────────────
  function shuffleCurrent() {
    const ds = JSON.parse(JSON.stringify(datasets[currentSet])); // deep copy
    ds.data = ds.data.map(d => ({
      ...d,
      value: Math.round(d.value * (0.6 + Math.random() * 0.9))
    }));
    draw(ds);
  }

  // ── INITIAL DRAW ──────────────────────────────────────
  draw(datasets[0]);
</script>
</body>
</html>
